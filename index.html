<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Harry Potter Expert Chatbot</title>

    <meta charset="UTF-8">
    <title>Harry Potter Expert Chatbot</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="chat-app">

        <header class="chat-header">
            <div class="bot-logo">⚡</div>

            <div>
                <h1>Harry Potter Expert Chatbot</h1>
                <p>Ask me about Hogwarts, characters and magic.</p >
            </div>
        </header>

        <section id="chatBox" class="chat-box">

            <div class="message bot-message">
                <div class="message-name">Harry Potter Expert</div>

                <div class="message-bubble">
                    Welcome! Ask me a question about Harry Potter.
                </div>
            </div>

        </section>

        <div class="input-area">

            <input
                id="userInput"
                type="text"
                placeholder="Type your question here..."
                autocomplete="off"
            >

            <button id="sendButton" type="button">
                Send
            </button>

        </div>

    </main>

    <script src="script.js"></script>

</body>

</html>
